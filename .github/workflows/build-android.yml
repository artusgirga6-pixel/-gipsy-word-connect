name: Build Android APK + AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --network-timeout 600000 --ignore-engines

      - name: Build React web app
        working-directory: frontend
        env:
          CI: false   # treat ESLint warnings as warnings, not errors
        run: yarn build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      # ─── Signing (uses keystore committed at frontend/android/app/release.keystore) ───
      # Passwords come from GitHub Secrets. If unset, release builds will be UNSIGNED.
      - name: Configure signing env
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_ALIAS=${ANDROID_KEY_ALIAS:-gipsywordconnect}" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
            echo "✓ Signing enabled — release artefacts will be SIGNED."
          else
            echo "⚠ Signing disabled — set ANDROID_KEYSTORE_PASSWORD secret to enable."
          fi

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Release AAB (Google Play bundle)
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gipsy-word-connect-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: gipsy-word-connect-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error

      - name: Upload Release AAB (for Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: gipsy-word-connect-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
