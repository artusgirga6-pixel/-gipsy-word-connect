name: Build Android APK + AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest   # x86_64 — Android SDK works natively here

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build React web app
        working-directory: frontend
        run: yarn build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      # ─── Signing keystore (only if secrets are configured) ──────────────
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/release.keystore
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      # ─── Builds ─────────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Release AAB (Google Play bundle)
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      # ─── Artifacts ──────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gipsy-word-connect-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: gipsy-word-connect-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error

      - name: Upload Release AAB (for Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: gipsy-word-connect-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
